name: Build Nicole APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Scarica Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -L "https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Crea file con API Key e SDK path
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > app/.env
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Rendi gradlew eseguibile
        run: chmod +x ./gradlew

      - name: Build APK Debug
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nicole-App-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
